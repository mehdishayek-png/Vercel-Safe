# Midas Match — PromptFoo LLM Evaluation Config
# Run: npx promptfoo eval
# View: npx promptfoo view

description: "Midas Match LLM prompt quality & regression tests"

providers:
  - id: openrouter:google/gemini-2.5-flash
    label: "Gemini 2.5 Flash (Primary)"
    config:
      apiBaseUrl: "https://openrouter.ai/api/v1"
      headers:
        HTTP-Referer: "https://midasmatch.com"
        X-Title: "Midas"
      temperature: 0
      max_tokens: 1000

  - id: openrouter:mistralai/mistral-7b-instruct
    label: "Mistral 7B (Fallback)"
    config:
      apiBaseUrl: "https://openrouter.ai/api/v1"
      headers:
        HTTP-Referer: "https://midasmatch.com"
        X-Title: "Midas"
      temperature: 0
      max_tokens: 1000

prompts:
  # 1. Resume Profile Extraction
  - id: resume-parser
    label: "Resume Profile Extraction"
    raw: |
      Extract the following from this resume and return ONLY valid JSON:

      1. name: Full name of the candidate
      2. headline: Current job title or professional headline
      3. skills: List of 5-8 SHORT, ATOMIC, SEARCH-OPTIMIZED keywords. STRICT LIMIT: 8 MAX.
      4. display_skills: Same skills but formatted for UI display
      5. industry: The primary industry/domain
      6. search_terms: 3-5 job title variations
      7. location: Current location in "City, State, Country" format
      8. experience_years: Total years of professional experience (number)
      9. role_complexity: One of "basic", "operational", "strategic", "executive"
      10. inferred_skills: 3-5 additional atomic domain keywords inferred from context

      CRITICAL: Each skill MUST be 1-3 words MAX. Use abbreviations (CX, SaaS, B2B, etc). Skip soft skills.

      Return ONLY a JSON object:
      {"name": "...", "headline": "...", "skills": [...], "display_skills": [...], "industry": "...", "search_terms": [...], "experience_years": 0, "location": "...", "role_complexity": "...", "inferred_skills": [...]}

      Resume text:
      {{resume_text}}

      JSON:

  # 2. Job Batch Scoring
  - id: job-scorer
    label: "LLM Batch Job Scorer"
    raw: |
      Score {{job_count}} jobs for this candidate. Return ONLY a JSON array of {{job_count}} integers 0-100.

      Candidate: {{headline}}, {{skills}}, ~{{experience_years}}yr exp

      {{jobs_text}}

      Scoring: Skills 30%, Role fit 20%, Seniority 30%, Company 20%.
      SENIORITY RULES (critical): If candidate has {{experience_years}}+ years exp, jobs with no "Senior"/"Lead"/"Principal" in the title are likely below their level — score ≤40.

      Return ONLY: [score1, score2, ...]

  # 3. Deep Job Analysis
  - id: deep-analysis
    label: "Deep Job Analysis"
    raw: |
      Analyze how well this candidate fits this job. Return ONLY valid JSON.

      CANDIDATE:
      Title: {{candidate_title}}
      Skills: {{candidate_skills}}
      Experience: {{experience_years}} years

      JOB:
      Title: {{job_title}}
      Company: {{job_company}}
      Description: {{job_description}}

      Return JSON:
      {"fit_score": 0-100, "strong_signals": ["..."], "gaps": ["..."], "salary_estimate": {"min": 0, "max": 0, "currency": "INR"}, "verdict": "one sentence", "tldr": "brief summary"}

  # 4. Cover Letter
  - id: cover-letter
    label: "Cover Letter Generator"
    raw: |
      Write a concise, tailored cover letter (2 paragraphs, 70-90 words) for this candidate applying to this job.

      Candidate: {{candidate_title}}, skills: {{candidate_skills}}
      Job: {{job_title}} at {{job_company}}
      Description: {{job_description}}

      Rules: Professional but human tone. No placeholders like [Company Name]. No generic filler.

tests:
  # ===== Resume Parser Tests =====
  - description: "Parse a software engineer resume"
    vars:
      resume_text: "John Smith — Senior Software Engineer at TechCorp (2019-present). Previously at StartupXYZ (2016-2019). Skills: Python, React, AWS, Docker, PostgreSQL, CI/CD. Built microservices handling 1M+ requests/day. Led team of 5. BS Computer Science from MIT, 2016. San Francisco, CA."
    assert:
      - type: is-json
      - type: javascript
        value: "JSON.parse(output).name === 'John Smith'"
      - type: javascript
        value: "JSON.parse(output).skills.length <= 8"
      - type: javascript
        value: "JSON.parse(output).skills.length >= 3"
      - type: javascript
        value: "JSON.parse(output).experience_years >= 5"
      - type: javascript
        value: "['basic','operational','strategic','executive'].includes(JSON.parse(output).role_complexity)"
      - type: javascript
        value: "JSON.parse(output).location.length > 0"

  - description: "Parse a CX specialist resume (abbreviation test)"
    vars:
      resume_text: "Priya Sharma — Customer Experience Specialist at B2B SaaS company (2021-present). Manages Zendesk, Okta SSO, and Workato integrations. Previously at Flipkart (2019-2021) in customer support operations. Handles authentication & access resolution, ticket workflow management. Mumbai, India. 4 years experience."
    assert:
      - type: is-json
      - type: javascript
        value: "const s = JSON.parse(output).skills; s.some(x => x === 'CX' || x === 'cx')"
        description: "Should abbreviate Customer Experience to CX"
      - type: javascript
        value: "const s = JSON.parse(output).skills; s.some(x => x === 'SaaS' || x === 'saas')"
        description: "Should abbreviate Software as a Service to SaaS"
      - type: javascript
        value: "JSON.parse(output).skills.length <= 8"
        description: "Should respect 8 skill limit"

  - description: "Parse minimal resume (edge case)"
    vars:
      resume_text: "Alex. Python developer. 1 year experience."
    assert:
      - type: is-json
      - type: javascript
        value: "JSON.parse(output).skills.length >= 1"
      - type: javascript
        value: "JSON.parse(output).experience_years >= 0"

  # ===== Job Scorer Tests =====
  - description: "Score jobs — seniority mismatch detection"
    vars:
      job_count: "3"
      headline: "Senior Software Engineer"
      skills: "Python, React, AWS, Docker"
      experience_years: "8"
      jobs_text: |
        JOB 1: Junior Python Developer @ StartupCo | Remote | Entry-level role, basic Python scripting
        JOB 2: Senior Backend Engineer @ BigTech | San Francisco | 7+ years, Python, distributed systems, AWS
        JOB 3: Intern - Web Development @ SmallBiz | NYC | Summer internship, HTML/CSS
    assert:
      - type: is-json
      - type: javascript
        value: "const s = JSON.parse(output); s.length === 3"
        description: "Should return exactly 3 scores"
      - type: javascript
        value: "const s = JSON.parse(output); s[1] > s[0]"
        description: "Senior role should score higher than junior for senior candidate"
      - type: javascript
        value: "const s = JSON.parse(output); s[2] <= 20"
        description: "Intern role should score ≤20 for 8yr senior candidate"

  - description: "Score jobs — skill match accuracy"
    vars:
      job_count: "2"
      headline: "Data Scientist"
      skills: "Python, TensorFlow, SQL, Pandas, ML"
      experience_years: "5"
      jobs_text: |
        JOB 1: Senior Data Scientist @ AI Corp | Remote | Python, TensorFlow, ML pipelines, 5+ years
        JOB 2: Marketing Manager @ AdAgency | NYC | Social media, campaign management, content strategy
    assert:
      - type: is-json
      - type: javascript
        value: "const s = JSON.parse(output); s[0] > 60"
        description: "Strong skill match should score >60"
      - type: javascript
        value: "const s = JSON.parse(output); s[1] < 30"
        description: "Complete mismatch should score <30"

  # ===== Deep Analysis Tests =====
  - description: "Deep analysis — good fit"
    vars:
      candidate_title: "Full Stack Developer"
      candidate_skills: "React, Node.js, PostgreSQL, AWS"
      experience_years: "4"
      job_title: "Full Stack Engineer"
      job_company: "TechStartup"
      job_description: "Looking for a Full Stack Engineer with 3-5 years experience. React, Node.js, PostgreSQL required. AWS experience preferred. Remote-friendly."
    assert:
      - type: is-json
      - type: javascript
        value: "JSON.parse(output).fit_score >= 60"
        description: "Good fit should score ≥60"
      - type: javascript
        value: "JSON.parse(output).strong_signals.length >= 1"
      - type: javascript
        value: "typeof JSON.parse(output).verdict === 'string' && JSON.parse(output).verdict.length > 5"

  # ===== Cover Letter Tests =====
  - description: "Cover letter — no placeholders"
    vars:
      candidate_title: "Product Manager"
      candidate_skills: "Agile, Roadmapping, SQL, Jira"
      job_title: "Senior Product Manager"
      job_company: "Acme Inc"
      job_description: "Lead product strategy for our B2B SaaS platform."
    assert:
      - type: not-contains
        value: "[Company Name]"
      - type: not-contains
        value: "[Your Name]"
      - type: not-contains
        value: "[Position]"
      - type: javascript
        value: "output.length > 100 && output.length < 800"
        description: "Should be 70-90 words (roughly 400-600 chars)"

  - description: "Cover letter — mentions company name"
    vars:
      candidate_title: "Software Engineer"
      candidate_skills: "Python, Django, React"
      job_title: "Backend Engineer"
      job_company: "Stripe"
      job_description: "Build payment APIs at scale."
    assert:
      - type: contains
        value: "Stripe"
        description: "Should mention the actual company name"
